name: projet_ds
description: "PhotoCoach AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # ML Kit
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_selfie_segmentation: ^0.10.1
  google_mlkit_face_detection: ^0.13.2

  # Image picking
  image_picker: ^1.1.2

  # Local storage
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # State management & preferences
  provider: ^6.1.5
  shared_preferences: ^2.3.5

  # Localization
  intl: ^0.20.2

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  # assets:
    # - assets/sounds/
